name: white_space_qwen
description: "A beautiful diary app with GitHub Gist sync"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # 本地数据库
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  
  # 网络请求
  dio: ^5.7.0
  
  # 本地存储
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  
  # Markdown
  flutter_markdown: ^0.7.4+3
  markdown: ^7.2.2
  
  # 工具类
  intl: ^0.20.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  
  # 文件操作
  file_picker: ^8.1.4
  share_plus: ^10.1.3
  image_picker: ^1.1.2
  
  # UI 增强
  flutter_animate: ^4.5.2
  go_router: ^14.6.2
  cached_network_image: ^3.4.1
  
  # 图表
  fl_chart: ^0.69.2

  # 日历
  table_calendar: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/