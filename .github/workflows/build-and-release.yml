name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Java 环境
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 设置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # 4. 获取依赖
      - name: Install dependencies
        run: flutter pub get

      # 4.5 修复 isar_flutter_libs namespace 问题
      - name: Fix isar_flutter_libs namespace
        run: |
          # 找到 isar_flutter_libs 的 build.gradle 并添加 namespace
          ISAR_BUILD_GRADLE=$(find /home/runner/.pub-cache/hosted/pub.dev -name "build.gradle" -path "*/isar_flutter_libs-*/android/build.gradle" 2>/dev/null | head -1)
          if [ -n "$ISAR_BUILD_GRADLE" ]; then
            echo "Found isar_flutter_libs build.gradle at: $ISAR_BUILD_GRADLE"
            # 在 android 块中添加 namespace
            sed -i '/^android {/a\    namespace "com.isar.flutter_libs"' "$ISAR_BUILD_GRADLE"
            echo "Added namespace to isar_flutter_libs"
          else
            echo "isar_flutter_libs build.gradle not found, trying alternative method..."
            # 尝试查找并修改 build.gradle.kts
            ISAR_BUILD_GRADLE_KTS=$(find /home/runner/.pub-cache/hosted/pub.dev -name "build.gradle.kts" -path "*/isar_flutter_libs-*/android/" 2>/dev/null | head -1)
            if [ -n "$ISAR_BUILD_GRADLE_KTS" ]; then
              sed -i '/^android {/a\    namespace = "com.isar.flutter_libs"' "$ISAR_BUILD_GRADLE_KTS"
              echo "Added namespace to isar_flutter_libs (kts)"
            fi
          fi

      # 5. 代码分析（只报告错误，warnings 和 infos 不阻断构建）
      - name: Analyze code
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # 6. 运行测试（如果有）
      - name: Run tests
        run: flutter test || true

      # 7. 构建 Android APK
      - name: Build Android APK
        run: flutter build apk --release

      # 8. 准备发布文件
      - name: Prepare release files
        run: |
          mkdir -p release_assets
          cp build/app/outputs/flutter-apk/app-release.apk release_assets/white_space_qwen-android.apk

      # 9. 创建 Release（仅在 tag 推送时）
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release_assets/white_space_qwen-android.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 10. 上传构建产物（PR 和非 tag 推送时）
      - name: Upload APK artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
